name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -r requirements.txt httpx
      - name: Tests
        run: python -m unittest discover tests
      - name: PII scan (generic patterns, full tree)
        run: sh scripts/check-pii.sh --tree
