name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -r requirements.txt httpx
      - name: Tests
        run: python -m unittest discover tests
      - name: PII scan (generic patterns, full tree)
        run: sh scripts/check-pii.sh --tree

  # The Windows test machine for the portable core (P0): no Mac stores, no
  # fcntl, no glibc strftime — if the suite passes here, the platform seams
  # are honest. The PII scan stays on the mac job (it is a shell script).
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -r requirements.txt httpx
      - name: Tests
        run: python -m unittest discover tests
      # The install script's provisioning path (python discovery, venv
      # --copies, pip incl. the git-URL dependency), run under Windows
      # PowerShell 5.1 — the stock shell a stranger's PC actually has —
      # not pwsh. -DryRun stops short of binding the port.
      - name: Install script provision (run.ps1 -DryRun, PS 5.1)
        shell: cmd
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\run.ps1 -DryRun
