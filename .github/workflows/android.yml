name: android

# The companion app's build check: compile + JVM unit tests, only when
# android/ changes — hub-only pushes stay on the fast python jobs.
on:
  push:
    branches: [main, "claude/**"]
    paths: ["android/**", ".github/workflows/android.yml"]
  pull_request:
    paths: ["android/**", ".github/workflows/android.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
      - name: Build + unit tests
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleDebug :app:testDebugUnitTest
