<!-- Vira app icon: static/favicon.svg at tile scale (every coordinate x16),
     so the home-screen tile and the browser tab carry the same mark.

     One deliberate difference from the favicon — the inset hairline border
     is dropped. iOS masks the tile to its own superellipse, which cuts the
     border's corners off and leaves four floating edge lines. Everything
     else is the favicon exactly: the same graphite field, the same bone
     chevron at the same weight, the same dot.

     Rasters are generated by scripts/make-icons.sh; edit here, never the
     PNGs. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#1a1d1e"/>
  <path d="M136 144 L256 392 L376 144" fill="none" stroke="#8a8478"
        stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="256" cy="96" r="22.4" fill="#8a8478"/>
</svg>
